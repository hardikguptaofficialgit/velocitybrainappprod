services:
  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: velocity
      POSTGRES_PASSWORD: velocity
      POSTGRES_DB: velocitybrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - velocitybrain

  # Core API (Python/FastAPI)
  core-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      BACKEND_API_URL: http://backend:5001
      INTERNAL_USAGE_SECRET: ${INTERNAL_USAGE_SECRET:-replace-with-internal-usage-secret}
      DATABASE_URL: postgresql://velocity:velocity@db:5432/velocitybrain
      ENV: production
      PORT: 8080
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - velocitybrain

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: 5001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      CORE_API_URL: http://core-api:8080
      APPWRITE_ENDPOINT: ${APPWRITE_ENDPOINT:-https://fra.cloud.appwrite.io/v1}
      APPWRITE_PROJECT_ID: ${APPWRITE_PROJECT_ID:-69e7d0a0002573ec6840}
      APPWRITE_DATABASE_ID: ${APPWRITE_DATABASE_ID:-velocitybrain}
      APPWRITE_API_KEY: ${APPWRITE_API_KEY:-}
      APPWRITE_PROFILE_IMAGES_BUCKET_ID: ${APPWRITE_PROFILE_IMAGES_BUCKET_ID:-profile_images}
      APPWRITE_WORKSPACE_IMAGES_BUCKET_ID: ${APPWRITE_WORKSPACE_IMAGES_BUCKET_ID:-workspace_images}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      INTERNAL_USAGE_SECRET: ${INTERNAL_USAGE_SECRET:-replace-with-internal-usage-secret}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      REVENUECAT_API_KEY: ${REVENUECAT_API_KEY:-}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
    depends_on:
      - core-api
    ports:
      - "5001:5001"
    networks:
      - velocitybrain

  # React Dashboard (served via nginx)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_APPWRITE_ENDPOINT: ${REACT_APP_APPWRITE_ENDPOINT:-https://fra.cloud.appwrite.io/v1}
        REACT_APP_APPWRITE_PROJECT_ID: ${REACT_APP_APPWRITE_PROJECT_ID:-69e7d0a0002573ec6840}
        REACT_APP_REVENUECAT_API_KEY: ${REACT_APP_REVENUECAT_API_KEY:-}
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - velocitybrain

volumes:
  pgdata:

networks:
  velocitybrain:
    driver: bridge
