services:
  # PostgreSQL database with production settings
  db:
    image: pgvector/pgvector:pg16
    container_name: velocitybrain-db
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velocity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-velocitybrain}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./migrations/schema_constraints.sql:/docker-entrypoint-initdb.d/02-constraints.sql:ro
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-velocity} -d $${POSTGRES_DB:-velocitybrain}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: velocitybrain-redis
    env_file:
      - .env.prod
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Main application
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: velocitybrain-api
    env_file: .env.prod
    environment:
      BACKEND_API_URL: http://backend:5001
      ENV: production
      PORT: 8080
      VELOCITYBRAIN_RUNTIME_MODE: self-hosted
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - velocitybrain-network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Node.js backend for auth, dashboard APIs, and API key validation
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocitybrain-backend
    env_file:
      - .env.prod
    environment:
      PORT: 5001
      NODE_ENV: production
      CORE_API_URL: http://api:8080
      BACKEND_API_URL: http://backend:5001
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "5001"
    restart: unless-stopped
    networks:
      - velocitybrain-network
    volumes:
      - ./secrets/firebase-service-account.json:/app/firebase-service-account.json:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Nginx reverse proxy for the API-only droplet.
  # The React dashboard is deployed separately on Vercel.
  nginx:
    image: nginx:alpine
    container_name: velocitybrain-nginx
    ports:
      # Keep VelocityBrain behind the host reverse proxy when sharing a droplet
      # with other apps such as Linkit. Caddy/Nginx on the host owns 80/443.
      - "${NGINX_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
      - backend
    restart: unless-stopped
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  velocitybrain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
