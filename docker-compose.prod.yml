services:
  # PostgreSQL database with production settings
  db:
    image: pgvector/pgvector:pg16
    container_name: velocitybrain-db
    environment:
      POSTGRES_USER: ${DB_USER:-velocity}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-velocitybrain}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./migrations/schema_constraints.sql:/docker-entrypoint-initdb.d/02-constraints.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-velocity} -d ${DB_NAME:-velocitybrain}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: velocitybrain-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Main application
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: velocitybrain-api
    env_file: .env.prod
    environment:
      BACKEND_API_URL: http://backend:5001
      INTERNAL_USAGE_SECRET: ${INTERNAL_USAGE_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-velocity}:${DB_PASSWORD}@db:5432/${DB_NAME:-velocitybrain}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENV: production
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - velocitybrain-network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Node.js backend for auth, dashboard APIs, and API key validation
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocitybrain-backend
    env_file:
      - .env.prod
    environment:
      PORT: 5001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORE_API_URL: http://api:8080
      BACKEND_API_URL: http://backend:5001
      INTERNAL_USAGE_SECRET: ${INTERNAL_USAGE_SECRET}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    restart: unless-stopped
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

  # React dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY:-}
        REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN:-}
        REACT_APP_FIREBASE_PROJECT_ID: ${REACT_APP_FIREBASE_PROJECT_ID:-}
        REACT_APP_FIREBASE_STORAGE_BUCKET: ${REACT_APP_FIREBASE_STORAGE_BUCKET:-}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID:-}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID:-}
        REACT_APP_FIREBASE_MEASUREMENT_ID: ${REACT_APP_FIREBASE_MEASUREMENT_ID:-}
        REACT_APP_REVENUECAT_API_KEY: ${REACT_APP_REVENUECAT_API_KEY:-}
    container_name: velocitybrain-dashboard
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

  # Nginx reverse proxy for the full SaaS product
  nginx:
    image: nginx:alpine
    container_name: velocitybrain-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
      - backend
      - dashboard
    restart: unless-stopped
    networks:
      - velocitybrain-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  velocitybrain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
