<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Velocity Brain workflow</title>
  <desc id="desc">A diagram showing repository context flowing through Velocity Brain memory and back into coding agents and the dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#151515" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#ea803a" />
      <stop offset="100%" stop-color="#5fd1b3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="160" cy="120" r="120" fill="#ea803a" opacity="0.08" />
  <circle cx="1110" cy="620" r="150" fill="#5fd1b3" opacity="0.08" />

  <text x="80" y="88" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    Velocity Brain workflow
  </text>
  <text x="80" y="126" fill="#a1a1aa" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Repository context comes in once, reusable memory comes back out across CLI, MCP, and the dashboard.
  </text>

  <rect x="80" y="190" width="280" height="320" rx="28" fill="#111827" stroke="#2b3242" stroke-width="2" filter="url(#shadow)" />
  <text x="112" y="246" fill="#ea803a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1">INPUTS</text>
  <text x="112" y="286" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Repos and tools</text>
  <text x="112" y="332" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Codebase structure</text>
  <text x="112" y="366" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Company integrations</text>
  <text x="112" y="400" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Agent task history</text>
  <text x="112" y="434" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">API key scoped access</text>
  <text x="112" y="482" fill="#71717a" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Slack, Google Workspace, GitHub,
  </text>
  <text x="112" y="508" fill="#71717a" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    local repositories, and hosted runs
  </text>

  <rect x="440" y="150" width="400" height="400" rx="32" fill="#18181b" stroke="url(#accent)" stroke-width="3" filter="url(#shadow)" />
  <text x="480" y="214" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">Velocity Brain</text>
  <text x="480" y="252" fill="#a1a1aa" font-family="Segoe UI, Arial, sans-serif" font-size="20">Hosted memory and reuse layer</text>
  <rect x="480" y="292" width="320" height="56" rx="18" fill="#221914" stroke="#ea803a" stroke-opacity="0.45" />
  <text x="510" y="327" fill="#f4c7a4" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Brain-first retrieval before work</text>
  <rect x="480" y="368" width="320" height="56" rx="18" fill="#10211d" stroke="#5fd1b3" stroke-opacity="0.45" />
  <text x="510" y="403" fill="#b8f0e2" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Reusable outputs with savings proof</text>
  <rect x="480" y="444" width="320" height="56" rx="18" fill="#171724" stroke="#6ea8ff" stroke-opacity="0.45" />
  <text x="510" y="479" fill="#cadcff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">CLI, API, dashboard, and MCP access</text>

  <rect x="920" y="190" width="280" height="320" rx="28" fill="#111827" stroke="#2b3242" stroke-width="2" filter="url(#shadow)" />
  <text x="952" y="246" fill="#5fd1b3" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1">OUTPUTS</text>
  <text x="952" y="286" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Agent surfaces</text>
  <text x="952" y="332" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">CLI task execution</text>
  <text x="952" y="366" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">MCP tool calls</text>
  <text x="952" y="400" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Dashboard telemetry</text>
  <text x="952" y="434" fill="#d4d4d8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Integration sync status</text>
  <text x="952" y="482" fill="#71717a" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Saved tokens, reuse hits,
  </text>
  <text x="952" y="508" fill="#71717a" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    connected repos, and run history
  </text>

  <path d="M360 350 C 400 350, 400 350, 440 350" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" />
  <polygon points="430,334 466,350 430,366" fill="#ea803a" />
  <path d="M840 350 C 880 350, 880 350, 920 350" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" />
  <polygon points="910,334 946,350 910,366" fill="#5fd1b3" />

  <text x="80" y="648" fill="#71717a" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Open-source boundary: the SDK, CLI, and MCP bridge live in velocitybrain-open-source. Hosted backend and dashboard stay in the main repo.
  </text>
</svg>
